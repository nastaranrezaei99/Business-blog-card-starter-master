<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />

    <title>Business Blog Card | devChallenges.io</title>

    
    <style>

      @font-face{
        font-family: "poppin";
        src: url("./fontes/1/Poppins/Poppins-SemiBold.ttf");
        font-weight: 100 900;
      }

      @font-face {
        font-family: "lato";
        src: url("./fontes/2/Lato/Lato-Bold.ttf");
        font-weight: 100 900;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        background-color: #F2F5F9;
      }

      .author-info {
        font-size: 14px;
        text-align: center;
        margin-top: 16px;
        color: rgb(55, 65, 81);
      }

      .author-info a {
        color: rgb(55, 65, 81);
        text-decoration: underline;
      }
      #image{
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-top: 40px;
        width: 600px;
        margin-left: auto;
        margin-right: auto;
      }
      #image1{
        border-radius: 10px;
        
        
      }
      #image2{
        
        position: absolute;
        left: 0;
        right: 0;
        bottom: -6px;
        width: 600px;
        height: auto;
      }
      #header1{

        font-family: "poppin";
        font-size: 1.5rem;
        width: 600px;
        color: #111729;

      }
      #p1{
        font-family: "lato";
        font-size:1rem ;
        width: 700px;
        color: #4A5567;


      }
    </style>
  </head>
  <body>
  

    <div class="author-info">
      Coded by <a href="#">Nastaran Rezaei</a> | Challenge by
      <a href="https://www.devchallenges.io?ref=challenge" target="_blank"
        >devChallenges.io</a
      >.
    </div>
    <div id="image">
      <img src="./resources/hero-image-1.jpg" id="image1" width="600px" height="500px">
      <img src="./resources/white-overlay.svg" id="image2">
    </div>

    <div id="box2">
      <h1 id="header1">Perfect solution for small business</h1>
      <p id="p1">Small businesses need to generate leads to grow. You can use tools like Ringy.</p>
    </div>

  </body>
</html>
